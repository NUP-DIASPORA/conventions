<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <!-- Background circle -->
  <circle cx="150" cy="150" r="148" fill="#1a3a6b"/>
  <circle cx="150" cy="150" r="138" fill="#2352a0"/>

  <!-- LA Skyline silhouette -->
  <g fill="#1a3a6b" opacity="0.7">
    <!-- Buildings left -->
    <rect x="30" y="120" width="18" height="70"/>
    <rect x="50" y="105" width="14" height="85"/>
    <rect x="66" y="115" width="16" height="75"/>
    <rect x="84" y="95" width="20" height="95"/>
    <rect x="106" y="80" width="14" height="110"/><!-- Tall center-left -->
    <rect x="122" y="108" width="10" height="82"/>
    <!-- Buildings right -->
    <rect x="170" y="110" width="12" height="80"/>
    <rect x="184" y="90" width="22" height="100"/><!-- Tall center-right -->
    <rect x="208" y="108" width="14" height="82"/>
    <rect x="224" y="118" width="16" height="72"/>
    <rect x="242" y="105" width="14" height="85"/>
    <rect x="258" y="120" width="18" height="70"/>
    <!-- Antenna on tall buildings -->
    <rect x="110" y="68" width="2" height="12"/>
    <rect x="187" y="78" width="2" height="12"/>
  </g>

  <!-- Small NUP emblem in center top -->
  <circle cx="150" cy="95" r="22" fill="white"/>
  <circle cx="150" cy="95" r="19" fill="#1a3a6b"/>
  <path d="M150 78 Q137 78 130 88 Q138 83 150 85 Q162 83 170 88 Q163 78 150 78Z" fill="white"/>
  <path d="M130 88 Q135 95 150 95 Q138 83 130 88Z" fill="#cc1f1f"/>
  <path d="M150 85 Q150 95 150 95 Q138 83 150 85Z" fill="white"/>
  <path d="M150 85 Q162 83 170 88 Q150 95 150 95 Q150 85 150 85Z" fill="#cc1f1f"/>
  <path d="M170 88 Q165 95 150 95 Q162 83 170 88Z" fill="white"/>
  <line x1="150" y1="95" x2="150" y2="110" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M150 110 Q150 116 145 116 Q140 116 140 111" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- White NUP band -->
  <rect x="15" y="148" width="270" height="46" rx="4" fill="white"/>
  <!-- NUP text -->
  <text x="150" y="182" font-family="Arial Black, Arial, sans-serif" font-size="30" font-weight="900" fill="#1a3a6b" text-anchor="middle" letter-spacing="4">NUP</text>
  <!-- Stars on band -->
  <text x="52" y="178" font-size="16" fill="#cc1f1f" text-anchor="middle">★</text>
  <text x="248" y="178" font-size="16" fill="#cc1f1f" text-anchor="middle">★</text>

  <!-- Red LOS ANGELES band -->
  <rect x="15" y="196" width="270" height="38" rx="4" fill="#cc1f1f"/>
  <text x="150" y="222" font-family="Arial Black, Arial, sans-serif" font-size="20" font-weight="900" fill="white" text-anchor="middle" letter-spacing="3">LOS ANGELES</text>

  <!-- Bottom 2026 arc -->
  <path id="year-arc" d="M 40,245 A 115,115 0 0,0 260,245" fill="none"/>
  <text font-family="Arial Black, Arial, sans-serif" font-size="22" font-weight="900" fill="white" letter-spacing="6">
    <textPath href="#year-arc" startOffset="50%" text-anchor="middle">2026</textPath>
  </text>

  <!-- Decorative lines near 2026 -->
  <line x1="60" y1="258" x2="88" y2="258" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="60" y1="263" x2="88" y2="263" stroke="#cc1f1f" stroke-width="1.5" opacity="0.6"/>
  <line x1="212" y1="258" x2="240" y2="258" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="212" y1="263" x2="240" y2="263" stroke="#cc1f1f" stroke-width="1.5" opacity="0.6"/>
</svg>
