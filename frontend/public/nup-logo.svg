<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="98" fill="#1a3a6b" />
  <circle cx="100" cy="100" r="88" fill="white" />

  <!-- Umbrella canopy -->
  <path d="M100 55 Q70 55 55 75 Q72 65 100 68 Q128 65 145 75 Q130 55 100 55Z" fill="#1a3a6b"/>
  <path d="M55 75 Q65 90 100 90 Q72 65 55 75Z" fill="#cc1f1f"/>
  <path d="M100 68 Q100 90 100 90 Q72 65 100 68Z" fill="#1a3a6b"/>
  <path d="M100 68 Q128 65 145 75 Q100 90 100 90 Q100 68 100 68Z" fill="#cc1f1f"/>
  <path d="M145 75 Q135 90 100 90 Q128 65 145 75Z" fill="#1a3a6b"/>

  <!-- Umbrella handle -->
  <line x1="100" y1="90" x2="100" y2="125" stroke="#1a3a6b" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M100 125 Q100 135 92 135 Q84 135 84 128" fill="none" stroke="#1a3a6b" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Arc text top: NATIONAL -->
