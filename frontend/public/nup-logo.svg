    <textPath href="#topArc" startOffset="50%" text-anchor="middle">NATIONAL</textPath>
  </text>

  <!-- Arc text bottom: UNITY PLATFORM -->
  <path id="bottomArc" d="M 22,110 A 78,78 0 0,0 178,110" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" letter-spacing="2">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">UNITY PLATFORM</textPath>
  </text>

  <!-- Stars -->
  <text x="32" y="105" font-size="10" fill="white" text-anchor="middle">★</text>
  <text x="168" y="105" font-size="10" fill="white" text-anchor="middle">★</text>
</svg>
